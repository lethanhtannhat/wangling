<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName corp-it.iconic-intl.com
        ServerAlias www.corp-it.iconic-intl.com
        ServerAdmin webmaster@localhost

        DocumentRoot /var/www/corp-it.iconic-intl.com/current/public
        <Directory /var/www/corp-it.iconic-intl.com/current/public>
            Options -Indexes +FollowSymLinks
            AllowOverride All
            Require all granted
        </Directory>

        ErrorLog ${APACHE_LOG_DIR}/corp-it.iconic-intl.com.error.log
        CustomLog ${APACHE_LOG_DIR}/corp-it.iconic-intl.com.access.log combined

        Include /etc/letsencrypt/options-ssl-apache.conf
        SSLCertificateFile /etc/letsencrypt/live/corp-it.iconic-intl.com/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/corp-it.iconic-intl.com/privkey.pem
    </VirtualHost>
</IfModule>
